# Pre-registered Phase 2 defaults (from Phase 1 research package).
# Do not change mid-run without a new run_id.

world:
  grid: [24, 24]
  T: 200
  food_density: 0.04
  energy_max: 100.0
  energy_start: 50.0
  drain_move: 1.0
  drain_rest: 0.5
  forage_energy: 15.0
  vision: 2  # local view radius (5x5 when 2)

fitness:
  w1: 3.0
  w2: 1.0
  w3: 0.5
  w4: 0.25
  w5: 0.05
  lambda_std: 0.15
  epsilon_accept: 0.05
  delta_success: 0.30

eval:
  N: 8
  train_seeds: [0, 1, 2, 3, 4, 5, 6, 7]
  holdout_seeds: [100, 101, 102, 103, 104, 105, 106, 107]
  episode_timeout_s: 5
  container_memory: 512m
  container_cpus: "1"

weights:
  backend: numpy_linear
  alpha: 0.02
  init_std: 0.01
  clip_abs: 5.0
  explore_train: 0.10
  explore_eval: 0.0          # deterministic holdout of learned policy
  gamma: 0.99
  bootstrap_episodes: 8      # BC from seed heuristics before REINFORCE
  bootstrap_alpha: 0.05

genomic:
  mutate_every_episodes: 10
  plateau_episodes: 20
  max_mutations: 30
  max_patch_lines: 80

# Phase 3 free-NIM critic (static precheck + nemotron critic pin)
critic:
  enabled: true
  # model: null → use config/nim.pinned.yaml models.critic
  fail_open: true   # on NIM error after static pass: approve@0.3 (false → reject)
  # Soft-threshold: NIM reject with code in soft_codes and conf < soft_threshold → still eval
  soft_threshold: 0.6
  soft_codes: [other, low_value]
  max_combined_lines: 500
  use_summarizer: true  # distill episodes into coder/critic context

# Free NIM pool budgets (router; free endpoints only)
pool:
  budget:
    max_rpm: 40
    max_tokens_session: 200000
    max_calls_session: 200
    max_mutations: 30

# Continuous evolution loop (seo evolve)
evolve:
  mutate_every_episodes: 10   # schedule: fire after this many seed-episodes
  plateau_episodes: 20        # plateau window (in multi-seed eval cycles if eval uses full seed set, counted in episodes)
  plateau_epsilon: 0.01       # max fitness span to treat as flat
  max_mutations: 30
  eval_every: 1
  # Phase 5 parent selection: active | fitness_rank | tournament
  select: active
  tournament_k: 3
  auto_elite_on_accept: false  # true when using fitness_rank/tournament via CLI defaults

paths:
  artifacts_dir: artifacts
  db_path: artifacts/seo.sqlite
  seed_genome: genomes/seed

sandbox:
  mode: docker              # docker | host
  image: seo-sandbox:py312  # local image with numpy (seo docker-build)
  network: none
  memory: 512m
  cpus: "1"
  pids_limit: 64
  require_docker: true
  episode_isolation: true   # run candidate (and optional parent) evals in Docker
  parent_isolation: false   # keep parent eval on host for speed; set true for full parity


ablation: B0  # B0 | Bw | Bc | Bcw

# Suite runner defaults (seo ablate)
ablation_suite:
  max_mutations: 8          # more free-NIM attempts under soft critic
  train_passes: 4           # Bw/Bcw REINFORCE passes after heuristic bootstrap
  repeats: 1                # K independent arm trajectories (mean±std on δ); use 3+ for claim
  quick:
    train_seeds: [0, 1, 2]
    holdout_seeds: [100, 101, 102]
    max_mutations: 1
    train_passes: 1
    dry_run: true
    repeats: 1
